site_name: Unreal Robotics Lab
site_description: MuJoCo physics simulation plugin for Unreal Engine. Guides, API reference, and technical documentation.
site_url: https://urlab-sim.github.io/UnrealRoboticsLab/
repo_url: https://github.com/URLab-Sim/UnrealRoboticsLab
repo_name: URLab-Sim/UnrealRoboticsLab

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: black
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  logo: images/logo.png
  favicon: images/logo.png
  font:
    text: Outfit
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      lang: en
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

# Local scratch/planning notes live in docs/ but are gitignored and never
# published. Exclude them so a local `mkdocs build` stays clean (CI never sees
# them: they are absent from a fresh checkout).
exclude_docs: |
  plan_*.md
  progress_*.md
  local_test_guide.md

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Guides:
    - Importing Robots: guides/importing.md
    - Articulations: guides/articulations.md
    - Geometry & Collision: guides/geometry.md
    - Sensors & Cameras: guides/sensors_cameras.md
    - Controllers: guides/controllers.md
    - Simulate Dashboard: guides/dashboard.md
    - Debug Visualization: guides/debug.md
    - Interaction: guides/interaction.md
    - Recording & Replay: guides/recording.md
  - Python & External Control:
    - Overview: python/index.md
    - Quickstart: python/quickstart.md
    - Running Policies: python/policies.md
    - API Reference: python/api.md
    - Protocol Reference: reference/protocol.md
  - Concepts:
    - Architecture: concepts/architecture.md
    - Networking: concepts/networking.md
    - Codegen: concepts/codegen.md
    - MJCF Support: concepts/mjcf_support.md
  - Contributing:
    - Building from Source: contributing/building.md
    - Codegen: contributing/codegen.md
    - Bumping MuJoCo: contributing/bumping_mujoco.md
  - Troubleshooting: troubleshooting.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
  - Contact: contact.md
